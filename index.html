<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Pan & Zoom — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: monospace;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 8px 12px;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: bold; margin-right: auto; }
    button {
      padding: 4px 10px;
      border: 2px solid #fff;
      background: #000;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: monospace;
    }
    button:hover { background: #fff; color: #000; }
    #container {
      flex: 1;
      min-height: 0;
      background: #ccc;
    }
    .info-bar {
      padding: 4px 12px;
      background: #000;
      color: #fff;
      font-size: 0.75rem;
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <h1>SVG Pan & Zoom — Pre-Rendered Tiles</h1>
  <select id="mapSelect" style="padding:4px 8px;border:2px solid #fff;background:#000;color:#fff;font-family:monospace;font-size:0.8rem;cursor:pointer;">
    <option value="">Loading…</option>
  </select>
  <button id="btn-fit">Fit</button>
  <button id="btn-zoomin">Zoom In</button>
  <button id="btn-zoomout">Zoom Out</button>
</header>

<div id="container"></div>

<div class="info-bar">
  Center: <span id="info-center">—</span>
  Zoom:  <span id="info-zoom">—</span>
  Level: <span id="info-level">—</span>
  Tiles: <span id="info-tiles">0</span>
</div>

<script type="module">
  import { FunkySvgViewer } from './src/index.js?v=4';

  const mapSelect = document.getElementById('mapSelect');
  let viewer = null;

  // ── Load available manifests via the server-side script ─────────
  async function loadManifestList() {
    try {
      const resp = await fetch('admin/list-manifests.php');
      if (resp.ok) {
        const list = await resp.json();
        mapSelect.innerHTML = list.map(m => {
          // PHP returns paths relative to admin/ (e.g. ../rasterizationData/...)
          // Strip the leading ../ so they resolve correctly from root
          const path = m.path.startsWith('../') ? m.path.slice(3) : m.path;
          return `<option value="${path}" data-svg="${m.name}">${m.name} (${m.levels} levels)</option>`;
        }).join('');
        if (list.length > 0) {
          const first = list[0].path.startsWith('../') ? list[0].path.slice(3) : list[0].path;
          mapSelect.value = first;
        }
      }
    } catch {
      // Fallback to hardcoded entries
      mapSelect.innerHTML = `
        <option value="rasterizationData/Altis_Map/manifest.json" data-svg="Altis_Map">Altis_Map</option>
        <option value="rasterizationData/Altis_Map_No_Lines/manifest.json" data-svg="Altis_Map_No_Lines">Altis_Map_No_Lines</option>
      `;
      mapSelect.value = "rasterizationData/Altis_Map/manifest.json";
    }
  }

  // ── Initialize viewer with the selected manifest ────────────────
  async function initViewer() {
    const selectedOption = mapSelect.selectedOptions[0];
    const manifestUrl = mapSelect.value;
    const svgName = selectedOption ? selectedOption.dataset.svg : 'Altis_Map';
    const baseUrl = manifestUrl.replace(/manifest\.json$/, '');

    if (viewer) {
      viewer.destroy();
      viewer = null;
    }

    viewer = new FunkySvgViewer('#container', {
      svg: svgName + '.svg',
      preRendered: {
        manifestUrl: manifestUrl,
        baseUrl: baseUrl,
      },
      background: '#ccc',
    });

    viewer.on('load', (d) => console.log('Loaded:', d.width, '×', d.height));
    viewer.on('ready', () => {
      console.log('Ready —', viewer._pyramid.numLevels, 'levels');
      // Diagnostic: confirm singleColorTiles data is present
      if (viewer._preRenderedLoader && viewer._preRenderedLoader._manifest) {
        const sc = viewer._preRenderedLoader._manifest.singleColorTiles;
        const count = sc ? Object.keys(sc).length : 0;
        console.log('[Diagnostic] singleColorTiles entries:', count);
        if (count > 0) {
          const sample = Object.entries(sc).slice(0, 3);
          console.log('[Diagnostic] Sample single-color tiles:', sample);
        } else {
          console.warn('[Diagnostic] No singleColorTiles in manifest!');
        }
        // Log cache-busting token being used
        if (viewer._preRenderedLoader._cacheToken) {
          console.log('[Diagnostic] Cache token:', viewer._preRenderedLoader._cacheToken);
        }
      }
    });
    viewer.on('move', updateInfo);
    viewer.on('zoom', updateInfo);
    viewer.on('tileload', () => {
      document.getElementById('info-tiles').textContent = viewer._cache.size;
    });
    viewer.on('click', (ev) => {
      console.log('Click world:', ev.worldX.toFixed(0), ev.worldY.toFixed(0));
    });

    await viewer.mount();
    updateInfo(viewer.getState());
  }

  // ── Info bar updates ───────────────────────────────────────────
  function updateInfo(state) {
    if (!state) return;
    document.getElementById('info-center').textContent =
      `(${state.centerX.toFixed(0)}, ${state.centerY.toFixed(0)})`;
    document.getElementById('info-zoom').textContent = state.zoom.toFixed(4);
    if (viewer._pyramid) {
      const lvl = viewer._pyramid.levelForZoom(state.zoom);
      document.getElementById('info-level').textContent =
        lvl + ' (' + viewer._pyramid.minLevel + '-' + viewer._pyramid.maxLevel + ')';
    }
    document.getElementById('info-tiles').textContent =
      viewer._cache ? viewer._cache.size : 0;
  }

  // ── Event handlers ─────────────────────────────────────────────
  document.getElementById('btn-fit').addEventListener('click', () => {
    if (viewer) viewer.fitToViewport();
  });
  document.getElementById('btn-zoomin').addEventListener('click', () => {
    if (viewer) viewer.zoomTo(viewer.getState().zoom / 1.5);
  });
  document.getElementById('btn-zoomout').addEventListener('click', () => {
    if (viewer) viewer.zoomTo(viewer.getState().zoom * 1.5);
  });

  mapSelect.addEventListener('change', async () => {
    await initViewer();
  });

  // ── Bootstrap ──────────────────────────────────────────────────
  await loadManifestList();
  await initViewer();
</script>
</body>
</html>
